name: Deploy to GitHub Pages

on:
  push:
    branches: [dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/ant-design-pro-template/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/ant-design-pro-template

      - name: Build
        run: npm run build
        working-directory: frontend/ant-design-pro-template
        env:
          PUBLIC_PATH: /Aetheris-MemOS/
          UMI_ENV: prod

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/ant-design-pro-template/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
