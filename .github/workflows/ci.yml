name: CI (Full)

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend CI
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89
          components: clippy, rustfmt

      - name: Create SQLite DB
        run: |
          mkdir -p data
          touch data/sqlx.sqlite

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'backend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --all
        continue-on-error: true

      - name: Build
        run: cargo build --release
        env:
          DATABASE_URL: "file:./data/sqlx.sqlite"

      - name: Test
        run: cargo test
        env:
          DATABASE_URL: "file:./data/sqlx.sqlite"

  # Frontend CI
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/ant-design-pro-template

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
