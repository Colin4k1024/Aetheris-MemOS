name: Backend CI

on:
  push:
    branches: [main, master, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  # Code Quality Check
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy linting
        run: cargo clippy --all
        continue-on-error: true

      - name: Check for broken links in docs
        run: |
          cargo doc --no-deps 2>&1 | tee /tmp/doc.log
          if grep -q "warning:" /tmp/doc.log; then
            echo "Doc warnings found"
          fi

  # Security Audit
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
        working-directory: backend
        continue-on-error: true

  # Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    needs: [code-quality, security]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create SQLite DB for SQLx compile check
        run: |
          mkdir -p data
          touch data/sqlx.sqlite

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'backend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release
        env:
          DATABASE_URL: "file:./data/sqlx.sqlite"

      - name: Test
        run: cargo test
        env:
          DATABASE_URL: "file:./data/sqlx.sqlite"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/target/release/adaptive-memory
          retention-days: 7
