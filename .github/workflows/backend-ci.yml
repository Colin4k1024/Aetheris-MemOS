name: Backend CI

on:
  push:
    branches: [main, master, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89

      - name: Create SQLite DB for SQLx compile check
        run: |
          mkdir -p data
          touch data/sqlx.sqlite

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'backend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release
        env:
          DATABASE_URL: "file:./data/sqlx.sqlite"

      - name: Test
        run: cargo test
        env:
          DATABASE_URL: "file:./data/sqlx.sqlite"
