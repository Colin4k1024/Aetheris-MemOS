services:
  # PostgreSQL 数据库（使用本地已有镜像，不重复拉取）
  postgres:
    image: registry.openanolis.cn/openanolis/postgres:10.21-8.6
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=memory
      - POSTGRES_PASSWORD=memory
      - POSTGRES_DB=memory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端服务（Ollama 使用本机已运行的实例，见 host.docker.internal）
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8008:8008"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_CONFIG=docker.toml
      - RUST_LOG=info
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8008
      - DATABASE_URL=postgres://memory:memory@postgres:5432/memory
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - NEO4J_HOST=neo4j
    volumes:
      - ./backend:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    working_dir: /app

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Ollama LLM服务
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      - OLLAMA_HOST=0.0.0.0

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  neo4j_data:
  neo4j_logs:
