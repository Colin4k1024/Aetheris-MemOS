listen_addr = "127.0.0.1:8008"

[db]
# PostgreSQL (local: start with docker compose up -d postgres, or set DATABASE_URL)
url = "postgres://memory:memory@localhost:5432/memory"
# 连接池配置
pool_size = 10
min_idle = 2
connection_timeout = 30
statement_timeout = 30

[jwt]
# 生产环境必须通过 APP_JWT_SECRET 环境变量设置强随机密钥，勿使用示例值
secret = "REPLACE_WITH_STRONG_SECRET_OR_USE_APP_JWT_SECRET"
expiry = 3600

[log]
file_name = "app.log"
rolling = "daily"

[llm]
# Ollama 配置
base_url = "http://localhost:11434"
model = "llama3"
timeout_seconds = 30

[embedding]
# 嵌入模型配置（通过 Ollama）
base_url = "http://localhost:11434"
model = "nomic-embed-text"
dimension = 768
timeout_seconds = 30

[qdrant]
# Qdrant 向量数据库配置
# 注意：qdrant-client 使用 gRPC，需要端口 6334（gRPC），而不是 6333（HTTP REST API）
host = "localhost"
port = 6334
collection_name = "long_term_memory"
vector_dimension = 768
distance_type = "Euclid"

[rerank]
# Rerank 重排序配置
base_url = "http://localhost:11434"
model = "bge-reranker-base"
enabled = true
candidate_multiplier = 2
min_score_threshold = 0.3
timeout_seconds = 30

[neo4j]
# Neo4j图数据库配置（密码可通过 APP_NEO4J_PASSWORD 环境变量覆盖）
host = "localhost"
port = 7687
username = "neo4j"
password = "REPLACE_WITH_YOUR_NEO4J_PASSWORD"
database = "neo4j"

[memory_evolution]
decay_lambda = 0.01

[redis]
# Redis configuration for STM cache (enabled via redis-stm feature)
url = "redis://localhost:6379"
pool_size = 10
default_ttl_seconds = 3600
