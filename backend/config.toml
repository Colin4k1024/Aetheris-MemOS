listen_addr = "127.0.0.1:8008"

[db]
url = "file:./data/sqlx.sqlite"

[jwt]
secret = "10015d7a3a32161e5b889d98ad16e05ac6aea52ff2185f0fec58fbb8272c3afb"
expiry = 3600

[log]
file_name = "app.log"
rolling = "daily"

[llm]
# Ollama 配置
base_url = "http://localhost:11434"
model = "llama3"
timeout_seconds = 30

[embedding]
# 嵌入模型配置（通过 Ollama）
base_url = "http://localhost:11434"
model = "nomic-embed-text"
dimension = 768
timeout_seconds = 30

[qdrant]
# Qdrant 向量数据库配置
# 注意：qdrant-client 使用 gRPC，需要端口 6334（gRPC），而不是 6333（HTTP REST API）
host = "localhost"
port = 6334
collection_name = "long_term_memory"
vector_dimension = 768
distance_type = "Euclid"

[rerank]
# Rerank 重排序配置
base_url = "http://localhost:11434"
model = "bge-reranker-base"
enabled = true
candidate_multiplier = 2
min_score_threshold = 0.3
timeout_seconds = 30

[neo4j]
# Neo4j图数据库配置
host = "localhost"
port = 7687
username = "neo4j"
password = "password"
database = "neo4j"
